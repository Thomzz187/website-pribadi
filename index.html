<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomzz | Developer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
    overflow-x:hidden;
}

/* Animated Background Grid */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image: 
        linear-gradient(rgba(0,255,153,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,153,0.1) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
    animation: moveGrid 10s linear infinite;
}

@keyframes moveGrid{
    from{background-position:0 0;}
    to{background-position:40px 40px;}
}

/* Navbar */
nav{
    position:fixed;
    width:100%;
    padding:15px;
    text-align:center;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px);
}

nav a{
    color:#00ff99;
    margin:0 15px;
    text-decoration:none;
    font-weight:500;
}

nav a:hover{
    color:white;
}

/* Hero Section */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero img{
    width:160px;
    border-radius:50%;
    border:3px solid #00ff99;
    margin-bottom:20px;
    box-shadow:0 0 20px #00ff99;
}

.hero h1 span{
    color:#00ff99;
}

.typing{
    font-size:18px;
    color:#00ff99;
    height:25px;
    margin-top:10px;
}

/* Buttons */
.btn{
    display:inline-block;
    padding:12px 25px;
    margin:10px 5px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.github{
    background:#00ff99;
    color:black;
}

.github:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ff99;
}

.whatsapp{
    background:#25D366;
    color:white;
}

.whatsapp:hover{
    transform:scale(1.1);
}

/* Projects */
.projects{
    padding:80px 20px;
    text-align:center;
}

.projects h2{
    color:#00ff99;
    margin-bottom:40px;
}

.project-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#111;
    padding:25px;
    width:280px;
    border-radius:15px;
    border:1px solid #00ff99;
    transition:0.4s;
    opacity:0;
    transform:translateY(50px);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px #00ff99;
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    background:black;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#projects">Project</a>
</nav>

<section class="hero" id="home">
    <img src="https://via.placeholder.com/160" alt="Foto Profil">
    <h1>Halo, Saya <span>Thomzz</span></h1>
    <div class="typing" id="typing"></div>

    <a href="https://github.com/thomzz187" target="_blank" class="btn github">🚀 GitHub</a>
    <a href="https://wa.me/628194010410" target="_blank" class="btn whatsapp">💬 WhatsApp</a>
</section>

<section class="projects" id="projects">
    <h2>My Projects</h2>

    <div class="project-grid">
        <div class="card">
            <h3>Website Portfolio</h3>
            <p>Website pribadi dengan tema hacker modern.</p>
        </div>

        <div class="card">
            <h3>Landing Page</h3>
            <p>Landing page responsive dan clean design.</p>
        </div>

        <div class="card">
            <h3>Simple Tools</h3>
            <p>Tools kecil yang membantu kebutuhan sehari-hari.</p>
        </div>
    </div>
</section>

<footer>
© 2026 Thomzz | Professional Hacker Minimalist
</footer>

<script>
/* Typing Effect */
const textArray = [
    "Saya bukan programmer ahli.",
    "Saya hanya share code yang saya pahami.",
    "Terima kasih sudah berkunjung!"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;
const typingElement = document.getElementById("typing");

function type(){
    if(i < textArray.length){
        if(!isDeleting && j <= textArray[i].length){
            currentText = textArray[i].substring(0,j++);
        } 
        else if(isDeleting && j >= 0){
            currentText = textArray[i].substring(0,j--);
        }

        typingElement.innerHTML = currentText;

        if(j == textArray[i].length){
            isDeleting = true;
            setTimeout(type,1000);
            return;
        }

        if(isDeleting && j === 0){
            isDeleting = false;
            i++;
            if(i === textArray.length) i = 0;
        }
    }
    setTimeout(type,70);
}
type();

/* Scroll Reveal */
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
    cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        if(rect.top < window.innerHeight - 100){
            card.classList.add("show");
        }
    });
});
</script>

</body>
    </html>
