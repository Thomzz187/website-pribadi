<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Pribadi Thomzz187</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

h1 span {
    color: #00ffd5;
}

p {
    max-width: 500px;
    margin: 10px auto 20px;
    opacity: 0.9;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: #00ffd5;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 30px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    background: white;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

footer {
    position: absolute;
    bottom: 20px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
    <h1>Halo, Saya <span>Thomzz187</span> 👋</h1>
    <p>
        Saya seorang developer yang tertarik pada dunia teknologi, 
        website development, dan project kreatif. 
        Selamat datang di website pribadi saya!
    </p>

    <a href="https://github.com/thomzz187" target="_blank" class="btn">
        🚀 Kunjungi GitHub Saya
    </a>
</div>

<footer>
    © 2026 Thomzz187 | Dibuat dengan HTML & CSS
</footer>

</body>
</html>
