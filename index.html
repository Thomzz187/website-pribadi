<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Pribadi Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            max-width: 600px;
            margin: 0 auto 20px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: white;
            color: #4e73df;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f8f9fc;
            transform: scale(1.05);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Foto Profil">
        <h1>Nama Kamu</h1>
        <p>
            Halo! Saya adalah seorang developer yang tertarik pada pengembangan website, 
            desain UI/UX, dan teknologi modern. Saya suka belajar hal baru dan 
            membangun proyek yang bermanfaat.
        </p>

        <a href="https://github.com/usernamekamu" target="_blank" class="btn">
            Kunjungi GitHub Saya
        </a>
    </div>

    <footer>
        © 2026 Nama Kamu | Dibuat dengan HTML & CSS
    </footer>

</body>
</html>
